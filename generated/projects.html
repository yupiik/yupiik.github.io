  })
  if (event.target.dataItem.parentLink) {
    event.target.dataItem.parentLink.isHover = true;
  }

})
networkSeries.nodes.template.events.on("out", function(event) {

    event.target.dataItem.parentLink.isHover = false;
  }
})
networkSeries.nodes.template.events.on("hit", function(event) {
  var filtered = chart.data[0].children.filter(function (item) {
    return item.name == event.target.dataItem.name;
  });
  var data = filtered && filtered.length == 1 ? filtered[0].data : undefined;
  if (!data) { return; }
  var name = data.full_name.replace('yupiik/', '');
  document.querySelector('#project-details-title').innerHTML = name;
  document.querySelector('#project-details-link').innerHTML = '<a href="' + data.html_url + '">' + name + '</a>';
